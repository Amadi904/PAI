<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game with Bonus</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #ecf0f1;
        }

        #grid {
            position: relative;
            display: grid;
            grid-template-columns: repeat(3, 100px);
            grid-template-rows: repeat(3, 100px);
            gap: 10px;
        }

        .square {
            position: relative;
            border: 1px solid #3498db;
            padding: 10px;
            text-align: center;
            background-color: #3498db;
            color: #fff;
        }

        .hero {
            background-color: #e74c3c;
        }

        .bonus-container {
            position: absolute;
            top: -10px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            color: #3498db;
            background-color: #f39c12;
            padding: 10px;
            box-sizing: border-box;
        }

        .bonus {
            background-color: #f39c12;
        }
    </style>
</head>
<body>
    <div id="grid"></div>
    <script src="script.js"></script>
</body>
</html>
